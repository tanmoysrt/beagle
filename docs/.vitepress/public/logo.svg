<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="beagle logo">
  <title>beagle</title>
  <!-- beagle head -->
  <g fill="none" stroke="#3b2a20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- face -->
    <path d="M30 34 q18 -14 36 0 q4 16 -4 28 q-14 12 -28 0 q-8 -12 -4 -28 Z" fill="#f4e7d3"/>
    <!-- ears -->
    <path d="M30 34 q-12 2 -12 22 q0 12 12 10" fill="#8a5a32"/>
    <path d="M66 34 q12 2 12 22 q0 12 -12 10" fill="#8a5a32"/>
    <!-- eyes -->
    <circle cx="41" cy="48" r="2.5" fill="#3b2a20" stroke="none"/>
    <circle cx="55" cy="48" r="2.5" fill="#3b2a20" stroke="none"/>
    <!-- snout + nose -->
    <path d="M44 58 q4 5 8 0" />
    <circle cx="48" cy="58" r="3.5" fill="#3b2a20" stroke="none"/>
  </g>
  <!-- magnifier -->
  <g fill="none" stroke="#2f6f4f" stroke-width="5" stroke-linecap="round">
    <circle cx="64" cy="64" r="14" fill="#ffffff" fill-opacity="0.0"/>
    <line x1="74" y1="74" x2="86" y2="86"/>
  </g>
</svg>
