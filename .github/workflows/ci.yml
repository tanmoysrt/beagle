name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      # The service tests shell out to git; configure an identity so commits work.
      - name: Configure git
        run: |
          git config --global user.email "ci@beagle.test"
          git config --global user.name "Beagle CI"

      - name: Run tests
        run: uv run pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build service image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: beagle-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
